version: "3.9"

services:
  # ── Spark + Jupyter dev container (VS Code attaches here) ───────────
  spark-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-dev
    hostname: spark-dev
    volumes:
      - .:/workspace:cached
    ports:
      - "8888:8888"   # Jupyter (fallback)
      - "4040:4040"   # Spark UI
    environment:
      - SPARK_HOME=/opt/spark
      - JAVA_HOME=/opt/java/openjdk
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
      - MSSQL_HOST=${MSSQL_HOST}
      - MSSQL_PORT=${MSSQL_PORT}
      - MSSQL_USER=${MSSQL_USER}
      - MSSQL_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_DB=${MSSQL_DB}
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - fabric-net

  # ── SQL Server 2022 ─────────────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    hostname: mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - fabric-net

volumes:
  mssql-data:

networks:
  fabric-net:
    driver: bridge
